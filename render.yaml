services:
  # 1. Redis Key-Value Store for BullMQ & Caching
  - type: keyvalue
    name: beacon-redis
    plan: free
    ipAllowList: [] # Private network only

  # 2. FastAPI AI Service
  - type: web
    name: beacon-ai-service
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: ai-service
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set in Render Dashboard if using Gemini API
      - key: HOST
        value: 0.0.0.0

  # 3. NestJS Backend API
  - type: web
    name: beacon-backend
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start:prod
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres.odxsbxdlyodjdvhdricv:Mahitsaxena%402006@aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
      - key: FRONTEND_URL
        value: https://sales-agent-plum-two.vercel.app
      - key: JWT_SECRET
        value: super-secret-key-change-me-in-production-12345
      - key: JWT_REFRESH_SECRET
        value: super-secret-refresh-key-change-me-45678
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: REDIS_HOST
        value: red-d8snn3flk1mo73da1tag
      - key: REDIS_PORT
        value: 6379
      - key: AI_SERVICE_URL
        value: http://beacon-ai-service:8000
      - key: OPENROUTER_API_KEY
        sync: false # Set to your OpenRouter API Key
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-chat-v3-0324:free
