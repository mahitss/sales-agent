databases:
  - name: beacon-db
    databaseName: beacon
    user: beacon_user
    plan: free

services:
  # 1. FastAPI AI Service
  - type: web
    name: beacon-ai-service
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: ai-service
    envVars:
      - key: GEMINI_API_KEY
        sync: false # User will input their Google Gemini API Key in the Render Dashboard
      - key: HOST
        value: 0.0.0.0

  # 2. NestJS Backend API
  - type: web
    name: beacon-backend
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start:prod
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beacon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 1d
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: AI_SERVICE_URL
        value: http://beacon-ai-service:8000

  # 3. Next.js Frontend
  - type: web
    name: beacon-frontend
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: beacon-backend
          property: host

