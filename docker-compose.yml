version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: beacon-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: beacon_sales_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: beacon-redis
    ports:
      - "6379:6379"
    restart: always

  ai-service:
    build:
      context: ./ai-service
    container_name: beacon-ai-service
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
    restart: always

  backend-node-1:
    build:
      context: ./backend
    container_name: backend-node-1
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/beacon_sales_agent?schema=public&connection_limit=50
      - JWT_SECRET=super-secret-key-change-me-in-production
      - JWT_REFRESH_SECRET=super-secret-key-change-me-in-production
      - JWT_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=no-reply@beacon-sales.com
      - WEBHOOK_SECRET=webhook-secret-key
      - LAUNCHDARKLY_SDK_KEY=
      - NODE_ENV=production
    depends_on:
      - ai-service
      - postgres
      - redis
    restart: always

  backend-node-2:
    build:
      context: ./backend
    container_name: backend-node-2
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/beacon_sales_agent?schema=public&connection_limit=50
      - JWT_SECRET=super-secret-key-change-me-in-production
      - JWT_REFRESH_SECRET=super-secret-key-change-me-in-production
      - JWT_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=no-reply@beacon-sales.com
      - WEBHOOK_SECRET=webhook-secret-key
      - LAUNCHDARKLY_SDK_KEY=
      - NODE_ENV=production
    depends_on:
      - ai-service
      - postgres
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    container_name: beacon-nginx
    ports:
      - "4000:4000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-node-1
      - backend-node-2
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: beacon-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WIDGET_SCRIPT_URL=http://localhost:4000/widget/logicra-widget.js
      - NEXT_PUBLIC_SENTRY_DSN=
    depends_on:
      - nginx
    restart: always

volumes:
  postgres_data:

